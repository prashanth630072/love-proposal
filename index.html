<!DOCTYPE html>
<html>
<head>
  <title>For You ❤️</title>
  <style>
    body {
      margin: 0;
      text-align: center;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to bottom right, #ff9a9e, #fad0c4);
      color: white;
      overflow: hidden;
    }
    h1 {
      margin-top: 80px;
      font-size: 45px;
      animation: fadeIn 2s;
    }
    p {
      font-size: 20px;
      animation: fadeIn 4s;
    }
    button {
      padding: 15px 30px;
      font-size: 18px;
      margin: 20px;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      transition: 0.3s;
    }
    #yes {
      background: #28a745;
      color: white;
    }
    #yes:hover {
      transform: scale(1.1);
    }
    #no {
      background: #dc3545;
      color: white;
      position: absolute;
    }
    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }
    .heart {
      position: absolute;
      color: red;
      animation: float 5s linear infinite;
    }
    @keyframes float {
      0% {transform: translateY(100vh);}
      100% {transform: translateY(-10vh);}
    }
  </style>
</head>

<body>

<h1>Hi My Love ❤️</h1>
<p id="message"></p>

<h2>Will you be mine forever? 💍</h2>

<button id="yes" onclick="yesClick()">Yes ❤️</button>
<button id="no" onmouseover="moveButton()">No 😜</button>

<audio autoplay loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mp3">
</audio>

<script>
let text = "From the moment I met you, my life changed... You are my happiness, my peace, my everything ❤️";
let i = 0;

function typing() {
  if (i < text.length) {
    document.getElementById("message").innerHTML += text.charAt(i);
    i++;
    setTimeout(typing, 50);
  }
}
typing();

function yesClick() {
  alert("Yay! I love you forever ❤️💍");
}

function moveButton() {
  let x = Math.random() * window.innerWidth;
  let y = Math.random() * window.innerHeight;
  document.getElementById("no").style.left = x + "px";
  document.getElementById("no").style.top = y + "px";
}

setInterval(() => {
  let heart = document.createElement("div");
  heart.innerHTML = "❤️";
  heart.className = "heart";
  heart.style.left = Math.random() * 100 + "vw";
  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 5000);
}, 300);
</script>

</body>
</html>
